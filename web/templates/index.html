<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Top bar -->
        <header class="topbar">
            <span class="logo">Jarvis</span>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="chat">Chat</button>
                <button class="tab-btn" data-tab="tasks">
                    Tasks <span class="badge" id="tasks-badge" hidden></span>
                </button>
                <button class="tab-btn tab-plus" disabled>+</button>
            </nav>
            <div class="topbar-controls">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">待机中</span>
                </div>
                <button class="stop-btn" id="stopBtn" title="打断回复" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                    停止
                </button>
            </div>
        </header>

        <!-- Tab content -->
        <main class="tab-content">
            <section id="tab-chat" class="tab-panel active">
                <div class="conversation" id="conversation">
                    <div class="welcome-msg">
                        <p>你好！我是 Jarvis，你的 AI 语音助手。</p>
                        <p>说 <strong>"Hey Jarvis"</strong> 唤醒我，或在下方输入文字。</p>
                    </div>
                </div>
            </section>
            <section id="tab-tasks" class="tab-panel">
                <div class="task-list" id="taskList">
                    <div class="empty-state" id="tasksEmptyState">
                        暂无定时任务，试试对 Jarvis 说「每天早上9点提醒我站会」
                    </div>
                </div>
            </section>
        </main>

        <!-- Input bar (hidden when Tasks tab active) -->
        <footer class="input-bar" id="input-bar">
            <button class="voice-toggle-btn active" id="voiceToggleBtn" title="语音回复开关">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path class="voice-on" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    <path class="voice-on" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
            </button>
            <button class="mic-btn" id="micBtn" title="切换麦克风">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <input type="text" id="textInput" placeholder="输入消息..." autocomplete="off">
            <button class="send-btn" id="sendBtn" title="发送">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
